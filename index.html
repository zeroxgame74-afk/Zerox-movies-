<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zerox.movies.ir</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@700&display=swap" rel="stylesheet">

<!-- 🔴 CUSTOM ICON (SVG) -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
<rect width='100' height='100' fill='%230b0b0b'/>
<circle cx='50' cy='50' r='32' fill='none' stroke='%23B61C1C' stroke-width='6'/>
<text x='50' y='63' font-size='40' text-anchor='middle' fill='%23B61C1C' font-family='Arial'>Z</text>
</svg>">

<style>

:root{
  --red:#B61C1C;
  --bg:#0b0b0b;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Vazirmatn';
  font-weight:700;
}

body{
  background:var(--bg);
  color:white;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 6%;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(14px);
  border-bottom:1px solid #1a1a1a;
  z-index:1000;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  color:var(--red);
  font-size:18px;
}

.logo span{
  width:10px;
  height:10px;
  background:var(--red);
  border-radius:50%;
  box-shadow:0 0 12px var(--red);
}

input{
  background:#141414;
  border:none;
  padding:9px 14px;
  border-radius:999px;
  color:white;
  outline:none;
  width:170px;
}

/* HERO */
.hero{
  margin-top:65px;
  height:65vh;
  position:relative;
}

.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(0.5);
}

.hero-text{
  position:absolute;
  bottom:40px;
  right:6%;
  max-width:420px;
  animation:fade 1.2s ease;
}

.hero-text h1{
  font-size:34px;
}

.hero-text p{
  margin-top:8px;
  color:#bbb;
}

@keyframes fade{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* SECTION */
section{
  padding:30px 6%;
}

h2{
  color:var(--red);
  font-size:16px;
  margin-bottom:14px;
}

/* ROW */
.row{
  display:flex;
  gap:12px;
  overflow-x:auto;
  padding-bottom:10px;
}

.row::-webkit-scrollbar{
  display:none;
}

/* CARD MINIMAL */
.card{
  min-width:150px;
  height:220px;
  border-radius:12px;
  overflow:hidden;
  position:relative;
  cursor:pointer;
  transition:.25s;
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.card:hover{
  transform:scale(1.04);
}

.card span{
  position:absolute;
  bottom:0;
  width:100%;
  padding:8px;
  text-align:center;
  background:linear-gradient(transparent,rgba(0,0,0,0.85));
  font-size:13px;
}

/* PLAYER */
.player{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:2000;
}

.player video{
  width:85%;
  max-width:900px;
  border-radius:10px;
}

.player button{
  margin-top:12px;
  padding:9px 16px;
  background:var(--red);
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

.hidden{display:none;}

</style>
</head>

<body>

<header>

<div class="logo">
<span></span>
Zerox.movies.ir
</div>

<input id="search" placeholder="جستجو...">

</header>

<!-- HERO -->
<div class="hero">
<img src="https://images.unsplash.com/photo-1524985069026-dd778a71c7b4">
<div class="hero-text">
<h1>Zerox Movies</h1>
<p>ساده، سریع، سینمایی</p>
</div>
</div>

<!-- MOVIES -->
<section>
<h2>فیلم‌های منتخب</h2>
<div class="row" id="movies"></div>
</section>

<!-- PLAYER -->
<div class="player hidden" id="player">
<video id="video" controls></video>
<button onclick="closePlayer()">بستن</button>
</div>

<script>

const movies=[
{t:"Joker",i:"https://picsum.photos/300/400?1",v:"https://www.w3schools.com/html/mov_bbb.mp4"},
{t:"Interstellar",i:"https://picsum.photos/300/400?2",v:"https://www.w3schools.com/html/movie.mp4"},
{t:"Batman",i:"https://picsum.photos/300/400?3",v:"https://www.w3schools.com/html/mov_bbb.mp4"},
{t:"Dune",i:"https://picsum.photos/300/400?4",v:"https://www.w3schools.com/html/movie.mp4"}
];

function render(){
let box=document.getElementById("movies");
box.innerHTML="";
movies.forEach(m=>{
box.innerHTML+=`
<div class="card" onclick="play('${m.v}')">
<img src="${m.i}">
<span>${m.t}</span>
</div>`;
});
}
render();

function play(src){
document.getElementById("player").classList.remove("hidden");
document.getElementById("video").src=src;
document.getElementById("video").play();
}

function closePlayer(){
document.getElementById("player").classList.add("hidden");
document.getElementById("video").pause();
}

document.getElementById("search").addEventListener("input",e=>{
let v=e.target.value.toLowerCase();
let f=movies.filter(m=>m.t.toLowerCase().includes(v));
let box=document.getElementById("movies");
box.innerHTML="";
f.forEach(m=>{
box.innerHTML+=`
<div class="card" onclick="play('${m.v}')">
<img src="${m.i}">
<span>${m.t}</span>
</div>`;
});
});

</script>

</body>
</html>
