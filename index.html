<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zerox.movies.ir</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@700&display=swap" rel="stylesheet">

<style>

:root{
  --red:#B61C1C;
  --bg:#0a0a0a;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Vazirmatn';
  font-weight:700;
}

body{
  background:var(--bg);
  color:white;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 6%;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(12px);
  border-bottom:1px solid #222;
  z-index:1000;
}

.logo{
  color:var(--red);
  font-size:20px;
  letter-spacing:1px;
}

input{
  background:#111;
  border:none;
  padding:10px 14px;
  border-radius:999px;
  color:white;
  outline:none;
  width:180px;
}

/* HERO */
.hero{
  margin-top:70px;
  height:70vh;
  position:relative;
  overflow:hidden;
}

.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(0.45);
}

.hero-text{
  position:absolute;
  bottom:60px;
  right:6%;
  max-width:450px;
}

.hero-text h1{
  font-size:38px;
}

.hero-text p{
  margin-top:10px;
  color:#bbb;
}

/* SECTION */
section{
  padding:30px 6%;
}

h2{
  color:var(--red);
  margin-bottom:15px;
  font-size:18px;
}

/* ROW */
.row{
  display:flex;
  overflow-x:auto;
  gap:12px;
  padding-bottom:10px;
}

.row::-webkit-scrollbar{display:none;}

/* CARD CLEAN */
.card{
  min-width:160px;
  height:240px;
  border-radius:14px;
  overflow:hidden;
  position:relative;
  cursor:pointer;
  transition:.3s;
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.card:hover{
  transform:scale(1.05);
}

.card span{
  position:absolute;
  bottom:0;
  width:100%;
  padding:10px;
  text-align:center;
  background:linear-gradient(transparent,rgba(0,0,0,0.9));
}

/* PLAYER */
.player{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.player video{
  width:85%;
  max-width:900px;
  border-radius:10px;
}

.player button{
  margin-top:15px;
  background:var(--red);
  border:none;
  padding:10px 18px;
  border-radius:8px;
  color:white;
}

.hidden{display:none;}

</style>
</head>

<body>

<header>
<div class="logo">Zerox.movies.ir</div>
<input id="search" placeholder="جستجو...">
</header>

<div class="hero">
<img src="https://images.unsplash.com/photo-1524985069026-dd778a71c7b4">
<div class="hero-text">
<h1>Zerox Movies</h1>
<p>تماشای فیلم و سریال با کیفیت سینمایی</p>
</div>
</div>

<section>
<h2>فیلم‌های محبوب</h2>
<div class="row" id="movies"></div>
</section>

<div class="player hidden" id="player">
<video id="video" controls></video>
<button onclick="closePlayer()">بستن</button>
</div>

<script>

const movies=[
{t:"Joker",i:"https://picsum.photos/300/400?1",v:"https://www.w3schools.com/html/mov_bbb.mp4"},
{t:"Interstellar",i:"https://picsum.photos/300/400?2",v:"https://www.w3schools.com/html/movie.mp4"},
{t:"Batman",i:"https://picsum.photos/300/400?3",v:"https://www.w3schools.com/html/mov_bbb.mp4"},
{t:"Dune",i:"https://picsum.photos/300/400?4",v:"https://www.w3schools.com/html/movie.mp4"}
];

function render(){
let box=document.getElementById("movies");
box.innerHTML="";
movies.forEach(m=>{
box.innerHTML+=`
<div class="card" onclick="play('${m.v}')">
<img src="${m.i}">
<span>${m.t}</span>
</div>`;
});
}
render();

function play(src){
document.getElementById("player").classList.remove("hidden");
document.getElementById("video").src=src;
document.getElementById("video").play();
}

function closePlayer(){
document.getElementById("player").classList.add("hidden");
document.getElementById("video").pause();
}

document.getElementById("search").addEventListener("input",e=>{
let v=e.target.value.toLowerCase();
let f=movies.filter(m=>m.t.toLowerCase().includes(v));
let box=document.getElementById("movies");
box.innerHTML="";
f.forEach(m=>{
box.innerHTML+=`
<div class="card" onclick="play('${m.v}')">
<img src="${m.i}">
<span>${m.t}</span>
</div>`;
});
});

</script>

</body>
</html>
