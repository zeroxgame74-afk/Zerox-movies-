<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zerox.movies.ir | تماشای آنلاین فیلم</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            color: #eef5ff;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 40px;
            border-bottom: 1px solid #2a3448;
            padding-bottom: 20px;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffb347, #ff6b4a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .logo span {
            font-size: 1rem;
            background: none;
            color: #7f8fa4;
            font-weight: normal;
        }

        .search-box input {
            padding: 12px 20px;
            border-radius: 40px;
            border: none;
            background: #1e2538;
            color: #fff;
            width: 260px;
            font-size: 0.9rem;
            outline: none;
            transition: 0.2s;
        }

        .search-box input:focus {
            background: #2a334a;
            box-shadow: 0 0 0 2px #ff6b4a80;
        }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 24px;
            margin-top: 30px;
        }

        .movie-card {
            background: #11161f;
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s;
            cursor: pointer;
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.5);
        }

        .movie-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 25px -12px black;
        }

        .poster-place {
            background: linear-gradient(145deg, #1f2a3e, #131a28);
            height: 260px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            color: #ffb34780;
        }

        .movie-info {
            padding: 16px 12px;
        }

        .movie-title {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .movie-year {
            font-size: 0.8rem;
            color: #9aa8c2;
        }

        .footer {
            margin-top: 60px;
            text-align: center;
            font-size: 0.75rem;
            color: #5f6c84;
            padding: 20px 0;
            border-top: 1px solid #1f2538;
        }

        @media (max-width: 550px) {
            .movies-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 16px;
            }
            .poster-place {
                height: 200px;
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="logo">
            Zerox.movies<span>.ir</span>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="جستجوی فیلم ...">
        </div>
    </header>

    <h2 style="font-weight: 500; font-size: 1.2rem;">🔥 جدیدترین و محبوب‌ترین‌ها</h2>
    <div class="movies-grid" id="moviesContainer"></div>
    <div class="footer">
        © Zerox.movies.ir - تماشای آنلاین بدون تبلیغ | تمامی فیلم‌ها با کیفیت بالا
    </div>
</div>

<script>
    // دیتابیس کوچک از فیلم‌ها (ساختگی برای حجم 50KB)
    const moviesData = [
        { title: "اوپنهایمر", year: 2023, poster: "⚛️" },
        { title: "باربی", year: 2023, poster: "🎀" },
        { title: "دانکرک", year: 2017, poster: "⛴️" },
        { title: "تنت", year: 2020, poster: "🔄" },
        { title: "پارازیت", year: 2019, poster: "🏠" },
        { title: "جوی رایدر", year: 2021, poster: "🏍️" },
        { title: "مرد عنکبوتی: راهی به خانه نیست", year: 2021, poster: "🕷️" },
        { title: "ژوکر", year: 2019, poster: "🎭" },
        { title: "بین ستاره‌ای", year: 2014, poster: "🪐" },
        { title: "جان ویک ۴", year: 2023, poster: "🔫" },
        { title: "افسانه‌های محافظ", year: 2022, poster: "⚡" },
        { title: "مأمور مخفی", year: 2024, poster: "🕵️" }
    ];

    function renderMovies(filterText = "") {
        const container = document.getElementById("moviesContainer");
        if (!container) return;

        const lowerFilter = filterText.toLowerCase();
        const filtered = moviesData.filter(movie => 
            movie.title.toLowerCase().includes(lowerFilter)
        );

        if (filtered.length === 0) {
            container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:50px;">🎬 فیلمی با این نام پیدا نشد!</div>`;
            return;
        }

        let html = "";
        for (let movie of filtered) {
            html += `
                <div class="movie-card" onclick="alert('در حال پخش: ${movie.title} (${movie.year}) \nلینک واقعی در نسخه نهایی اضافه خواهد شد.')">
                    <div class="poster-place">
                        ${movie.poster}
                    </div>
                    <div class="movie-info">
                        <div class="movie-title">${movie.title}</div>
                        <div class="movie-year">${movie.year}</div>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    // جستجوی لحظه‌ای
    const searchInput = document.getElementById("searchInput");
    if (searchInput) {
        searchInput.addEventListener("input", (e) => {
            renderMovies(e.target.value);
        });
    }

    // بار اولیه
    renderMovies();
</script>
</body>
</html>
